<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memory Heist</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      color: #e0e0e0;
      overflow: hidden;
      user-select: none;
    }

    /* ── HUD ─────────────────────────────────────── */
    #game-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    #hud {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 600px;
      padding: 6px 0;
    }

    .hud-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      min-width: 56px;
    }

    .hud-label {
      font-size: 9px;
      letter-spacing: 2px;
      color: #444;
      text-transform: uppercase;
    }

    .hud-value {
      font-size: 22px;
      font-weight: bold;
      color: #c8a84b;
      letter-spacing: 1px;
      transition: color 0.3s ease;
    }

    .hud-value.dim {
      font-size: 16px;
      color: #555;
    }

    @keyframes timer-pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.55; transform: scale(1.08); }
    }
    .timer-pulse {
      animation: timer-pulse 0.45s ease-in-out infinite;
      display: inline-block;
    }

    #phase-badge {
      background: #1a1a2e;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 6px 18px;
      font-size: 13px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #e0e0e0;
      transition: all 0.25s ease;
    }
    #phase-badge.memorize {
      border-color: #c8a84b;
      color: #c8a84b;
      box-shadow: 0 0 10px rgba(200,168,75,0.2);
    }
    #phase-badge.escape {
      border-color: #4be8c8;
      color: #4be8c8;
      box-shadow: 0 0 10px rgba(75,232,200,0.2);
    }

    /* ── Peek HUD ────────────────────────────────── */
    #peek-row {
      display: none;
      align-items: center;
      gap: 8px;
      height: 22px;
      opacity: 0.55;
      transition: opacity 0.2s ease;
    }
    #peek-row.visible {
      display: flex;
    }
    #peek-row.visible.is-active {
      opacity: 1;
    }

    .peek-label {
      font-size: 9px;
      letter-spacing: 2px;
      color: #555;
      text-transform: uppercase;
    }

    #peek-dots {
      font-size: 13px;
      letter-spacing: 3px;
      color: #c8a84b;
      transition: color 0.15s ease, text-shadow 0.15s ease;
    }
    #peek-dots.is-peeking {
      color: #ffe066;
      text-shadow: 0 0 8px rgba(255,224,102,0.7);
    }

    .peek-key {
      font-size: 9px;
      letter-spacing: 1px;
      color: #333;
      border: 1px solid #2a2a3a;
      border-radius: 3px;
      padding: 2px 6px;
    }

    /* ── Canvas ──────────────────────────────────── */
    #canvas-container {
      position: relative;
      border: 1px solid #1e1e2e;
      box-shadow: 0 0 40px rgba(0,0,0,0.8), 0 0 80px rgba(200,168,75,0.03);
      transition: box-shadow 0.15s ease, border-color 0.15s ease;
    }
    #canvas-container.peeking {
      border-color: rgba(200,168,75,0.55);
      box-shadow: 0 0 40px rgba(0,0,0,0.8), 0 0 22px rgba(200,168,75,0.28), 0 0 60px rgba(200,168,75,0.12);
    }
    canvas { display: block; }

    #countdown-flash {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 80px;
      font-weight: bold;
      color: #c8a84b;
      pointer-events: none;
      opacity: 0;
      z-index: 50;
      text-shadow: 0 0 40px rgba(200,168,75,0.8);
    }

    /* ── Win/Lose Overlay ────────────────────────── */
    #overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(10,10,15,0.92);
      z-index: 100;
      gap: 18px;
      backdrop-filter: blur(4px);
      transition: opacity 0.35s ease;
    }
    #overlay.hidden { opacity: 0; pointer-events: none; }

    .overlay-title {
      font-size: 42px;
      font-weight: bold;
      letter-spacing: 6px;
      text-transform: uppercase;
    }
    .overlay-title.gold { color: #c8a84b; text-shadow: 0 0 30px rgba(200,168,75,0.5); }
    .overlay-title.red  { color: #e84b4b; text-shadow: 0 0 30px rgba(232,75,75,0.5); }
    .overlay-title.cyan { color: #4be8c8; text-shadow: 0 0 30px rgba(75,232,200,0.5); }

    .overlay-sub {
      font-size: 13px;
      color: #666;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .overlay-stats {
      font-size: 14px;
      color: #888;
      letter-spacing: 1px;
      text-align: center;
      line-height: 1.9;
    }
    .overlay-stats span { color: #c8a84b; }

    #btn-start, #btn-retry, #btn-next {
      margin-top: 4px;
      padding: 13px 38px;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      letter-spacing: 3px;
      text-transform: uppercase;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      transition: all 0.18s ease;
      outline: none;
      font-weight: bold;
    }
    #btn-start, #btn-next { background: #c8a84b; color: #0a0a0f; }
    #btn-retry             { background: #e84b4b; color: #fff; }
    #btn-start:hover, #btn-next:hover { background: #d4b96a; transform: scale(1.05); }
    #btn-retry:hover  { background: #f06060; transform: scale(1.05); }

    .key-hint {
      font-size: 11px;
      color: #444;
      letter-spacing: 2px;
    }

    /* ── Tutorial overlay ────────────────────────── */
    #tutorial-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(5,5,12,0.88);
      z-index: 200;
      backdrop-filter: blur(6px);
      transition: opacity 0.3s ease;
      cursor: pointer;
    }
    #tutorial-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .tut-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      max-width: 360px;
      padding: 38px 44px;
      background: rgba(18,18,30,0.95);
      border: 1px solid #2a2a42;
      border-radius: 8px;
      box-shadow: 0 0 50px rgba(0,0,0,0.7), 0 0 20px rgba(200,168,75,0.06);
      text-align: center;
    }

    .tut-badge {
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #c8a84b;
      background: rgba(200,168,75,0.1);
      border: 1px solid rgba(200,168,75,0.25);
      border-radius: 3px;
      padding: 3px 10px;
    }

    #tut-title {
      font-size: 24px;
      font-weight: bold;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #e8e8e8;
    }

    #tut-desc {
      font-size: 13px;
      color: #888;
      letter-spacing: 0.5px;
      line-height: 1.8;
      white-space: pre-line;
    }

    @keyframes tut-hint-pulse {
      0%, 100% { opacity: 0.4; }
      50%       { opacity: 1; }
    }
    .tut-hint {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #555;
      margin-top: 8px;
      animation: tut-hint-pulse 1.5s ease-in-out infinite;
    }

    /* ── Full-screen flash effects ──────────────── */
    #death-flash, #win-flash {
      position: fixed;
      inset: 0;
      opacity: 0;
      pointer-events: none;
      z-index: 150;
    }
    #death-flash { background: rgba(200, 30, 30, 0.75); }
    #win-flash   { background: rgba(50, 200, 100, 0.45); }
  </style>
</head>
<body>

  <!-- Full-screen flash overlays -->
  <div id="death-flash"></div>
  <div id="win-flash"></div>

  <!-- Tutorial mechanic intro overlay (z-index 200, above everything) -->
  <div id="tutorial-overlay" class="hidden">
    <div class="tut-card">
      <div class="tut-badge">New Mechanic</div>
      <div id="tut-title"></div>
      <div id="tut-desc"></div>
      <div class="tut-hint">Press any key to continue</div>
    </div>
  </div>

  <div id="game-wrapper">
    <div id="hud">
      <div class="hud-item">
        <span class="hud-label">Level</span>
        <span class="hud-value" id="hud-level">1</span>
      </div>

      <div class="hud-item">
        <span class="hud-label">Best</span>
        <span class="hud-value dim" id="hud-best">--</span>
      </div>

      <div id="phase-badge">Standby</div>

      <div class="hud-item">
        <span class="hud-label">Timer</span>
        <span class="hud-value" id="hud-timer">--</span>
      </div>
    </div>

    <!-- Peek HUD row (hidden until level 7+) -->
    <div id="peek-row">
      <span class="peek-label">Peek</span>
      <span id="peek-dots"></span>
      <span class="peek-key">SPACE</span>
    </div>

    <div id="canvas-container">
      <canvas id="game-canvas"></canvas>
      <div id="countdown-flash"></div>
    </div>
  </div>

  <div id="overlay">
    <div class="overlay-title gold">MEMORY HEIST</div>
    <div class="overlay-sub">Memorize the vault. Then break in.</div>
    <div class="overlay-stats">
      Arrow keys or WASD to move<br/>
      Avoid traps &mdash; reach the exit
    </div>
    <button id="btn-start">Begin Heist</button>
    <button id="btn-retry" style="display:none">Try Again</button>
    <button id="btn-next"  style="display:none">Next Level</button>
    <div class="key-hint">PRESS ENTER</div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
